name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # This will create a Release PR when you push to main.
          # When the PR is merged, it will create a GitHub Release and Tag.
          release-type: simple
